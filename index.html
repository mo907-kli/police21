<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ادارة الشرطة | L.S.P.D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --bg-deep: #03050a;
            --btn-bg: rgba(12, 18, 30, 0.6);
            --btn-border: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.12);
            --cyan: #00eaff;
            --cyan-glow: rgba(0, 234, 255, 0.5);
            --red: #ff3333;
            --green: #00ff6a;
            --text-main: #ffffff;
            --font-ar: 'Tajawal', sans-serif;
            --font-en: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        input, textarea, select, .crypto-res, .rec-item span, .task-table td { user-select: text !important; }

        body {
            background: radial-gradient(circle at center, #080d1a 0%, #020306 100%);
            color: var(--text-main); font-family: var(--font-ar);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        #star-bg { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 5s infinite; opacity: 0; }
        @keyframes twinkle { 0% { opacity: 0; transform: translateY(0); } 50% { opacity: 0.5; } 100% { opacity: 0; transform: translateY(-50px); } }

        .central-logo-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; z-index: -1; opacity: 0.03; pointer-events: none;
            background-image: url('yyW7oBx.jpg'); background-size: cover; background-position: center;
            border-radius: 50%; clip-path: circle(47% at 50% 50%);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 🟢 تصميم الهوية الـ 3D (الجديد) 🟢 --- */
        #idCardOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 100000; display: none; justify-content: center; align-items: center; flex-direction: column; animation: fadeIn 0.3s ease; }
        .executive-card {
            width: 480px; height: 240px;
            background: linear-gradient(135deg, rgba(15, 20, 30, 0.95) 0%, rgba(5, 8, 12, 1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 3px solid var(--cyan); border-radius: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,1);
            display: flex; align-items: center; padding: 30px;
            position: relative; transform-style: preserve-3d; cursor: crosshair;
        }
        .card-watermark { position: absolute; right: 20px; top: 20px; font-size: 10rem; color: rgba(255, 255, 255, 0.01); pointer-events: none; transform: translateZ(-10px); }
        .info-section-card { flex: 1; text-align: right; transform: translateZ(40px); transform-style: preserve-3d; }
        .sys-title-card { color: #666; font-family: var(--font-en); font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 5px; font-weight: 700; }
        .name-card { margin: 0; font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateZ(20px); }
        .rank-card { margin: 5px 0 20px 0; color: var(--cyan); font-family: var(--font-en); font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .simple-status { display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 255, 106, 0.05); border: 1px solid rgba(0, 255, 106, 0.2); padding: 5px 12px; border-radius: 6px; font-family: var(--font-en); font-weight: 700; font-size: 0.85rem; color: #00ff6a; transform: translateZ(30px); }
        .status-dot-anim { width: 7px; height: 7px; background: #00ff6a; border-radius: 50%; box-shadow: 0 0 8px #00ff6a; animation: pulse 2s infinite; }
        .image-section-card { margin-left: 25px; position: relative; transform: translateZ(60px); }
        .profile-img-card { width: 130px; height: 130px; object-fit: cover; border-radius: 16px; border: 2px solid rgba(0, 234, 255, 0.5); background: #0a0f1a; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-controls { margin-top: 30px; display: flex; gap: 15px; }
        .card-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-family: var(--font-ar); font-weight: bold; transition: 0.2s; }
        .card-btn:hover { background: var(--cyan); color: #000; }

        /* --- شاشة الدخول --- */
        #loginScreen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        .login-container { width: 380px; padding: 40px; background: rgba(10, 15, 25, 0.9); border: 1px solid var(--btn-border); border-radius: 8px; text-align: center; animation: fadeIn 0.5s ease-out; }
        .login-logo { width: 80px; height: 80px; margin: 0 auto 20px; background-image: url('yyW7oBx.jpg'); background-size: cover; border-radius: 50%; border: 1px solid var(--cyan); box-shadow: 0 0 15px var(--cyan-glow); }
        .login-title { font-size: 1.4rem; color: #fff; margin-bottom: 25px; font-weight: bold;}
        .inp-group { position: relative; margin-bottom: 15px; }
        .inp-group i { position: absolute; top: 50%; transform: translateY(-50%); color: var(--cyan); opacity: 0.7; right: 15px; }
        .login-input { width: 100%; padding: 12px 45px; background: rgba(0,0,0,0.5); border: 1px solid var(--btn-border); color: #fff; outline: none; border-radius: 4px; font-family: var(--font-ar); transition: 0.3s;}
        .login-input:focus { border-color: var(--cyan); }
        .login-btn { width: 100%; padding: 12px; margin-top: 10px; background: var(--cyan); border: none; color: #000; font-weight: bold; font-size: 1.1rem; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #fff; box-shadow: 0 0 15px var(--cyan-glow); }
        .error-msg { color: var(--red); font-size: 0.9rem; margin-top: 15px; display: none; font-weight: bold; }

        /* --- الهيدر --- */
        #mainWrapper { display: none; flex: 1; flex-direction: column; transition: opacity 0.5s ease; height: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; z-index: 10; }
        
        .header-side { display: flex; gap: 12px; align-items: center; }
        .pill-btn {
            background: rgba(15, 20, 35, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); padding: 8px 20px; border-radius: 20px;
            color: #bbb; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
        }
        .pill-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); color: #fff; }
        
        .sys-title { font-size: 1rem; font-weight: bold; color: #888; letter-spacing: 1px; }

        /* --- الشبكة الرئيسية --- */
        #dashboardView { flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 50px; animation: fadeIn 0.4s ease; }
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 850px; }
        .menu-btn { background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 6px; padding: 20px 10px; text-align: center; color: #ddd; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; animation: fadeIn 0.5s ease-out forwards; }
        .menu-btn:hover { background: var(--btn-hover); border-color: rgba(255,255,255,0.2); color: #fff; }

        /* --- شاشة القسم --- */
        #moduleView { display: none; flex: 1; flex-direction: column; width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px 0 40px; animation: fadeIn 0.3s ease; }
        .module-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 20px; flex-direction: row-reverse; }
        .module-title { font-size: 1.4rem; color: var(--cyan); font-weight: bold; margin: 0; }
        .back-btn { background: transparent; border: 1px solid var(--btn-border); color: #ccc; padding: 8px 25px; border-radius: 4px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .back-btn:hover { background: rgba(255,255,255,0.05); border-color: #fff; color: #fff; }
        
        #dynamicContentArea { flex: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        #dynamicContentArea::-webkit-scrollbar { width: 4px; } #dynamicContentArea::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 4px; }

        /* --- تصميم الإدخالات --- */
        .input-section { background: rgba(8, 12, 20, 0.7); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; backdrop-filter: blur(5px); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .gen-input { width: 100%; padding: 14px; background: #010204; border: 1px solid rgba(255,255,255,0.05); color: #fff; border-radius: 6px; outline: none; transition: 0.3s; font-family: var(--font-ar); font-size: 0.95rem; text-align: right;}
        .gen-input:focus { border-color: var(--cyan); }
        select.gen-input { appearance: none; cursor: pointer; color: #888; } select.gen-input option { background: #000; color: #fff; text-align: right;}
        
        .file-input-wrapper { position: relative; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; background: #010204; height: 50px; overflow: hidden; transition: 0.3s; }
        .file-input-wrapper:hover { border-color: var(--cyan); }
        .file-input-wrapper input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .file-label-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 0.95rem; pointer-events: none; width: 100%; text-align: center;}
        
        .submit-btn { width: 100%; padding: 15px; background: var(--cyan); border: none; font-weight: bold; font-size: 1.1rem; border-radius: 6px; cursor: pointer; color: #000; transition: 0.3s;}
        .submit-btn:hover { background: #fff; box-shadow: 0 0 15px var(--cyan-glow); }

        .rec-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; color: #ddd; font-size: 0.95rem; }
        .action-icon { cursor: pointer; margin: 0 5px; font-size: 1.1rem; transition: 0.2s; opacity: 0.8;}
        .action-icon:hover { transform: scale(1.2); opacity: 1; }
        .icon-del { color: var(--red); }
        
        .task-table { width: 100%; border-collapse: collapse; text-align: center; }
        .task-table th { background: rgba(0,234,255,0.05); color: var(--cyan); padding: 12px; border: 1px solid var(--btn-border); font-weight: bold; position: sticky; top: 0;}
        .task-table td { padding: 10px; border: 1px solid var(--btn-border); color: #ccc; }
        .badge-pending { background: rgba(255, 193, 7, 0.1); color: var(--yellow); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; border: 1px solid var(--yellow);}
        .badge-approved { background: rgba(0, 255, 106, 0.1); color: var(--green); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; border: 1px solid var(--green);}

        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .video-card { background: #000; border: 1px solid var(--btn-border); border-radius: 8px; padding: 10px; position: relative; }
        .video-player { width: 100%; aspect-ratio: 16/9; border-radius: 4px; }
        .del-video-btn { position: absolute; top: -10px; left: -10px; background: var(--red); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; display:flex; justify-content:center; align-items:center;}

        /* --- شريط الأخبار السفلي --- */
        .news-ticker-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 1000px; background: rgba(10, 15, 25, 0.8);
            border: 1px solid var(--btn-border); border-radius: 30px;
            display: flex; align-items: center; padding: 5px; z-index: 10; backdrop-filter: blur(10px);
        }
        .news-badge { background: var(--red); color: #fff; padding: 6px 20px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; z-index: 2; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(255,51,51,0.5); }
        .news-logo { width: 25px; height: 25px; background-image: url('yyW7oBx.jpg'); background-size: cover; border-radius: 50%; margin: 0 10px; filter: grayscale(1); }
        .news-scroll-wrapper { overflow: hidden; flex: 1; white-space: nowrap; position: relative; }
        .news-scroll { display: inline-block; color: #aaa; font-size: 0.85rem; font-weight: 500; animation: scroll-left 30s linear infinite; }
        .news-scroll span { margin: 0 20px; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- شاشة الملف الشخصي --- */
        #profileView { display: none; gap: 20px; width: 85%; max-width: 1100px; margin: 0 auto; flex: 1; padding-bottom: 80px; animation: slideUpFade 0.4s ease; }
        .prof-card { background: rgba(8, 12, 20, 0.8); border: 1px solid var(--btn-border); border-radius: 12px; padding: 30px; text-align: center; width: 350px; }
        .prof-data { flex: 1; background: rgba(8, 12, 20, 0.8); border: 1px solid var(--btn-border); border-radius: 12px; padding: 25px; overflow-y: auto; }
        .prof-avatar { width: 120px; height: 120px; background: #010204; border: 2px solid var(--cyan); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 3.5rem; color: var(--cyan); cursor: pointer; position: relative; overflow: hidden; background-size: cover; background-position: center; transition: 0.3s; }
        .prof-avatar:hover::after { content: '\f030'; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; background: rgba(0,0,0,0.6); inset: 0; display: flex; justify-content: center; align-items: center; font-size: 2rem; color: #fff; }

        /* التكبير */
        #imgZoomOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 99999; display: none; justify-content: center; align-items: center; cursor: zoom-out; }
        #imgZoomOverlay img { max-width: 90%; max-height: 90%; border: 2px solid var(--cyan); border-radius: 6px; box-shadow: 0 0 40px var(--cyan-glow); transform: scale(0.9); transition: 0.3s; }
        #imgZoomOverlay.active img { transform: scale(1); }
        .clickable-img { cursor: zoom-in; transition: 0.3s; border: 1px solid var(--cyan); border-radius: 4px; }
        .clickable-img:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--cyan-glow); }
        
        .crypto-area textarea { width: 100%; height: 100px; background: #010204; border: 1px solid var(--btn-border); border-radius: 4px; color: var(--cyan); padding: 10px; margin-bottom: 10px; outline: none; font-family: monospace; }
        .crypto-res { background: #010204; border: 1px solid var(--btn-border); border-radius: 4px; padding: 15px; color: #fff; min-height: 50px; font-family: monospace; word-break: break-all; padding-inline-end: 45px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .modal-box { width: 650px; padding: 30px; background: #080d1a; border: 1px solid var(--cyan); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); animation: slideUpFade 0.3s ease-out; }
        .close-btn { width: 100%; background: transparent; border: 1px solid #333; color: #888; padding: 10px; margin-top: 5px; cursor: pointer; border-radius: 6px; transition: 0.3s;}
        .close-btn:hover { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body id="appBody">

    <script src="config.js"></script>

    <div id="star-bg"></div>
    <div id="imgZoomOverlay" onclick="closeImgZoom()"><img id="zoomedImg" src=""></div>
    <div class="central-logo-bg"></div>

    <div id="idCardOverlay">
        <div class="executive-card" data-tilt data-tilt-max="12" data-tilt-speed="400" data-tilt-perspective="1000" data-tilt-glare data-tilt-max-glare="0.2">
            <i class="fa-solid fa-shield-halved card-watermark"></i>
            <div class="info-section-card">
                <div class="sys-title-card">L.S.P.D EXECUTIVE ID</div>
                <h2 class="name-card" id="cardNameDisp">--</h2>
                <div class="rank-card" id="cardRankDisp">--</div>
                <div class="simple-status"><span class="status-dot-anim"></span> SYSTEM ACTIVE</div>
            </div>
            <div class="image-section-card">
                <div class="img-frame" style="position: absolute; inset: -8px; border: 1px dashed rgba(255, 255, 255, 0.2); border-radius: 22px; pointer-events: none;"></div>
                <img id="cardImage" src="https://cdn.discordapp.com/attachments/1079065638502404167/1476016754705567824/D25Todl.png" class="profile-img-card">
            </div>
        </div>
        <div class="card-controls">
            <label class="card-btn"><i class="fa-solid fa-camera"></i> تغيير الصورة<input type="file" id="cardImageInput" accept="image/*" style="display: none;" onchange="updateCardImg(this)"></label>
            <button class="card-btn" onclick="closeIdCard(); openProfile();" style="background: rgba(0,234,255,0.1); border-color: var(--cyan); color: var(--cyan);">الملف الشخصي</button>
            <button class="card-btn" onclick="closeIdCard()" style="background: rgba(255,51,51,0.1); border-color: var(--red); color: var(--red);">إغلاق</button>
        </div>
    </div>

    <div id="loginScreen">
        <div class="login-container">
            <div class="login-logo"></div>
            <div class="login-title" data-i18n="login_title">نظام إدارة الشرطة</div>
            <div class="inp-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="userInput" class="login-input" data-i18n-ph="login_ph_id" placeholder="اسم المستخدم" autocomplete="off">
            </div>
            <div class="inp-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="passInput" class="login-input" data-i18n-ph="login_ph_pass" placeholder="كلمة المرور" autocomplete="off">
            </div>
            <button class="login-btn" onclick="login()" data-i18n="login_btn">تسجيل الدخول</button>
            <div class="error-msg" id="loginError" data-i18n="login_err">بيانات الدخول غير صحيحة</div>
        </div>
    </div>

    <div id="mainWrapper">
        <header>
            <div class="header-side">
                <div class="pill-btn" onclick="toggleLang()" id="langToggle">English</div>
                <div class="pill-btn" onclick="goHome()" title="الرئيسية"><i class="fa-solid fa-house"></i></div>
                <div class="pill-btn" onclick="logout()" title="تسجيل الخروج"><i class="fa-solid fa-user-xmark"></i></div>
            </div>
            
            <div class="sys-title" data-i18n="app_title">إدارة الشرطة</div>
            
            <div class="header-side" style="flex-direction: row-reverse;">
                <div class="pill-btn" onclick="openIdCard()" title="عرض الهوية" style="color: var(--cyan); border-color: var(--cyan);">
                    <span id="rankNameDisp">--</span>
                    <i class="fa-solid fa-id-card" style="margin-right: 5px;"></i>
                </div>
            </div>
        </header>

        <div id="dashboardView">
            <div class="main-grid" id="modulesContainer"></div>
        </div>

        <div id="moduleView">
            <div class="module-header">
                <button class="back-btn" onclick="goHome()" data-i18n="btn_back">العودة للرئيسية</button>
                <h2 class="module-title" id="mTitle">--</h2>
            </div>
            
            <div id="dynamicContentArea"></div>
            
            <div class="input-section">
                <div id="mInputs"></div>
                <button class="submit-btn" id="submitBtn" onclick="addRecord()" data-i18n="btn_add">إضافة / حفظ السجل</button>
            </div>
        </div>

        <div id="profileView">
            <div class="prof-card">
                <input type="file" id="profilePicInput" accept="image/*" style="display: none;" onchange="updateProfilePic(this)">
                <div class="prof-avatar" id="profAvatar" onclick="document.getElementById('profilePicInput').click()">
                    <i class="fa-solid fa-camera" id="profAvatarIcon" style="opacity: 0.3;"></i>
                </div>
                <h2 style="color:#fff; font-size:1.8rem; margin:0 0 5px;" id="pName">--</h2>
                <div style="color:var(--cyan); font-family:var(--font-en); font-weight:bold; margin-bottom:20px; font-size:1.1rem;" id="pRank">--</div>
                
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding:10px 0; font-size:0.9rem;">
                    <span data-i18n="st_status">حالة الاتصال</span><span style="color:var(--green)">متصل <i class="fa-solid fa-circle" style="font-size:0.5rem"></i></span>
                </div>
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding:10px 0; font-size:0.9rem;">
                    <span data-i18n="st_sec">التصريح</span><span style="color:var(--cyan)" id="pSec">--</span>
                </div>
            </div>
            
            <div class="prof-data">
                <h3 style="color:var(--cyan); border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px; margin-bottom:15px;"><i class="fa-solid fa-file-contract"></i> <span data-i18n="my_reps">تقاريري</span></h3>
                <div id="profReportsList"></div>

                <h3 style="color:var(--cyan); border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px; margin-bottom:15px; margin-top:20px;"><i class="fa-solid fa-crosshairs"></i> <span data-i18n="my_tasks">مهامي</span></h3>
                <div id="profTasksList"></div>
            </div>
        </div>

        <div class="news-ticker-container">
            <div class="news-badge" data-i18n="news_badge">خبر عاجل</div>
            <div class="news-logo"></div>
            <div class="news-scroll-wrapper">
                <div class="news-scroll">
                    <span data-i18n="n1">تم إنشاء قسم التشفير المتقدم <i class="fa-solid fa-lock"></i></span>
                    <span data-i18n="n2">إطلاق مميزات متقدمة في قسم الخرائط <i class="fa-solid fa-map"></i></span>
                    <span data-i18n="n3">إضافة طبقات حماية جديدة تعزز أمن الموقع <i class="fa-solid fa-shield"></i></span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="cryptoModal">
        <div class="modal-box">
            <h3 style="color:var(--cyan); margin-bottom:15px;" data-i18n="cryp_title">قسم التشفير</h3>
            <div class="crypto-area">
                <textarea id="cryIn" data-i18n-ph="cryp_ph" placeholder="أدخل النص..." autocomplete="off"></textarea>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button class="submit-btn" onclick="doCrypto('enc')" style="margin:0" data-i18n="cryp_btn_enc">تشفير</button>
                    <button class="submit-btn" onclick="doCrypto('dec')" style="margin:0; background:#fff; color:#000;" data-i18n="cryp_btn_dec">فك تشفير</button>
                </div>
                <div class="crypto-res-wrapper">
                    <div class="crypto-res" id="cryOut"></div>
                    <i class="fa-solid fa-copy" onclick="copyCrypto()" style="position: absolute; top: 50%; transform: translateY(-50%); left: 15px; color: var(--cyan); font-size: 1.2rem; cursor: pointer;"></i>
                </div>
            </div>
            <button class="close-btn" onclick="document.getElementById('cryptoModal').style.display='none'" data-i18n="btn_close">إغلاق</button>
        </div>
    </div>

    <script>
        // 🟢 روابط الصوت الصحيحة والمباشرة 🟢
        const successSound = new Audio("https://cdn.discordapp.com/attachments/1079065638502404167/1480272844402196784/vAulQyj.mp3");
        const errorSound = new Audio("https://cdn.discordapp.com/attachments/1079065638502404167/1480273461221003444/Y6uHG7S.mp3");

        const starContainer = document.getElementById('star-bg');
        for(let i=0; i<80; i++) {
            const star = document.createElement('div'); star.className = 'star';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starContainer.appendChild(star);
        }

        function openImgZoom(src) { document.getElementById('zoomedImg').src = src; document.getElementById('imgZoomOverlay').style.display = 'flex'; setTimeout(() => document.getElementById('imgZoomOverlay').classList.add('active'), 10); }
        function closeImgZoom() { document.getElementById('imgZoomOverlay').classList.remove('active'); setTimeout(() => document.getElementById('imgZoomOverlay').style.display = 'none', 300); }

        const configOfficers = (typeof OfficerRanks !== 'undefined') ? OfficerRanks : ["Minister of Interior", "Police Commander", "L.S.P.D Chief", "Deputy L.S.P.D Chief", "Colonel", "Major", "Captain", "First Lieutenant", "Lieutenant"];
        const configEnlisted = (typeof EnlistedRanks !== 'undefined') ? EnlistedRanks : ["Warrant Officer", "Sergeant Major", "Sergeant", "Corporal", "Officer", "Cadet"];
        const SystemRanks = [...configOfficers, ...configEnlisted];
        
        let myRankIdx = 99; let canManageAccounts = false;

        const i18n = {
            ar: {
                login_title: "نظام إدارة الشرطة", login_ph_id: "اسم المستخدم", login_ph_pass: "كلمة المرور", login_btn: "تسجيل الدخول", login_err: "بيانات الدخول غير صحيحة",
                app_title: "إدارة الشرطة", title_logout: "تسجيل الخروج", news_badge: "خبر عاجل",
                n1: "تم إنشاء قسم التشفير المتقدم", n2: "إطلاق مميزات متقدمة في قسم الخرائط", n3: "إضافة طبقات حماية جديدة تعزز أمن الموقع",
                cryp_title: "قسم التشفير", cryp_ph: "أدخل النص...", cryp_btn_enc: "تشفير النص", cryp_btn_dec: "فك التشفير",
                btn_add: "إضافة / حفظ السجل", btn_back: "العودة للرئيسية", btn_close: "إغلاق",
                th_officer: "المسؤول", th_assignee: "المستلم", th_pts: "النقاط", th_reason: "المهمة الموكلة", th_status: "الحالة", th_act: "إجراء", st_pend: "قيد الانتظار", st_appr: "معتمدة ✔️",
                m_rep: "التقارير", m_cry: "قسم التشفير", m_box: "الصندوق الاسود", m_sav: "التقارير المحفوظة", m_not: "ملاحظات القيادة",
                m_map: "خرائط العمليات", m_off: "المسؤولين", m_wan: "المطلوبين", m_tsk: "قسم المهام / النقاط", m_gng: "قسم العصابات", m_vid: "قسم الفيديو", m_arm: "مستودع الأسلحة",
                v_title: "عنوان الفيديو", v_yt: "رابط يوتيوب", v_or: "أو ملف", v_err: "أدخل العنوان ورابط أو ملف",
                r_name: "الاسم الكامل", r_badge: "البادج العسكري", r_crim: "نوع التقرير", r_det: "اكتب التقرير بالكامل هنا...",
                o_user: "اسم المستخدم", o_pass: "كلمة المرور", o_name: "الاسم الكامل", o_rank: "اختر الرتبة", o_err: "يرجى تعبئة جميع الحقول", o_exists: "موجود مسبقاً", o_no_perm: "لا تملك الصلاحية",
                my_reps: "تقاريري المرفوعة", my_tasks: "المهام الموكلة لي", st_status: "حالة الاتصال", st_sec: "التصريح الأمني"
            },
            en: {
                login_title: "SYSTEM LOGIN", login_ph_id: "USERNAME", login_ph_pass: "PASSWORD", login_btn: "LOGIN", login_err: "INVALID CREDENTIALS",
                app_title: "POLICE DEPARTMENT", title_logout: "Logout", news_badge: "BREAKING",
                n1: "Advanced Crypto Dept online", n2: "New Ops Maps features deployed", n3: "Security layers enhanced",
                cryp_title: "CRYPTO DEPT", cryp_ph: "INPUT TEXT...", cryp_btn_enc: "ENCRYPT", cryp_btn_dec: "DECRYPT",
                btn_add: "SUBMIT", btn_back: "BACK TO MAIN", btn_close: "CLOSE",
                th_officer: "Officer", th_assignee: "Assignee", th_pts: "Points", th_reason: "Task", th_status: "Status", th_act: "Act", st_pend: "Pending", st_appr: "Approved",
                m_rep: "Reports", m_cry: "Crypto", m_box: "Black Box", m_sav: "Saved", m_not: "Notes", m_map: "Maps", m_off: "Accounts", m_wan: "Wanted", m_tsk: "Tasks", m_gng: "Gangs", m_vid: "Video", m_arm: "Armory",
                v_title: "Video Title", v_yt: "YT Link", v_or: "OR File", v_err: "Enter Title & Link",
                r_name: "Name", r_badge: "Badge", r_crim: "Report Type", r_det: "Report details...",
                o_user: "User", o_pass: "Pass", o_name: "Name", o_rank: "Rank", o_err: "Fill fields", o_exists: "User exists", o_no_perm: "No permission",
                my_reps: "My Reports", my_tasks: "My Tasks", st_status: "Status", st_sec: "Security Level"
            }
        };

        const modules = [
            { id: 'crypto', i18n_t: 'm_cry', isCrypto: true },
            { id: 'blackbox', i18n_t: 'm_box', inputsAr: ['رقم السجل', 'كود الوصول'], inputsEn: ['Record ID', 'Access Code'] },
            { id: 'reports', i18n_t: 'm_rep', isReportForm: true },
            
            { id: 'maps', i18n_t: 'm_map', hasImage: true, inputsAr: ['الإحداثيات', 'المنطقة'], inputsEn: ['Coords', 'Zone'] },
            { id: 'notes', i18n_t: 'm_not', inputsAr: ['الموضوع', 'النص'], inputsEn: ['Subject', 'Body'] },
            { id: 'tasks', i18n_t: 'm_tsk', isTable: true },
            
            { id: 'saved', i18n_t: 'm_sav', inputsAr: ['رقم التقرير', 'التصنيف'], inputsEn: ['Report ID', 'Class'] },
            { id: 'wanted', i18n_t: 'm_wan', hasImage: true, inputsAr: ['اسم الهدف', 'التهمة', 'الخطورة'], inputsEn: ['Name', 'Crime', 'Risk'] },
            { id: 'video', i18n_t: 'm_vid', isVideo: true },
            
            { id: 'gangs', i18n_t: 'm_gng', inputsAr: ['الاسم', 'النشاط'], inputsEn: ['Name', 'Activity'] },
            { id: 'officials', i18n_t: 'm_off', isAccountsForm: true },
            { id: 'armory', i18n_t: 'm_arm', inputsAr: ['نوع السلاح', 'الرقم التسلسلي', 'المستلم'], inputsEn: ['Weapon Type', 'Serial No', 'Assignee'] }
        ];

        let currentLang = 'ar'; let isOfficer = false; let isHighCommand = false; let currentModule = null;
        let db = { reports: [], wanted: [], maps: [], officials: [], tasks: [], video: [], gangs: [], armory: [], notes: [], saved: [], blackbox: [], crypto: [] };

        window.onload = () => { applyLanguage(); };

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => { if(i18n[currentLang][el.getAttribute('data-i18n')]) el.innerHTML = i18n[currentLang][el.getAttribute('data-i18n')]; });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { if(i18n[currentLang][el.getAttribute('data-i18n-ph')]) el.placeholder = i18n[currentLang][el.getAttribute('data-i18n-ph')]; });
            document.getElementById('appBody').setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('appBody').style.fontFamily = currentLang === 'ar' ? 'var(--font-ar)' : 'var(--font-en)';
            document.getElementById('langToggle').innerText = currentLang === 'ar' ? 'English' : 'عربي';
            if(document.getElementById('modulesContainer').innerHTML !== '') renderModules();
        }

        function toggleLang() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; applyLanguage(); if(currentModule && document.getElementById('moduleView').style.display === 'flex') openMod(currentModule.id); }

        function login() {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            
            let configU = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            let localUsers = JSON.parse(localStorage.getItem('lspd_sys_users')) || [];
            let allUsers = [...configU, ...localUsers];
            
            let foundUser = allUsers.find(x => x.user === u && x.pass === p);
            
            if(foundUser) {
                // 🟢 تشغيل صوت الترحيب هنا 🟢
                successSound.play().catch(e => console.log(e));

                const ls = document.getElementById('loginScreen'); ls.style.opacity = '0';
                setTimeout(() => {
                    ls.style.display = 'none'; 
                    document.getElementById('mainWrapper').style.display = 'flex';
                    document.getElementById('rankNameDisp').innerText = foundUser.name; 
                    
                    myRankIdx = SystemRanks.indexOf(foundUser.rank);
                    if(myRankIdx === -1) myRankIdx = SystemRanks.length - 1; 
                    isOfficer = true; canManageAccounts = configOfficers.includes(foundUser.rank); isHighCommand = (myRankIdx >= 0 && myRankIdx <= 8); 
                    
                    renderModules();
                }, 500);
            } else { 
                // 🟢 تشغيل صوت الخطأ هنا 🟢
                errorSound.play().catch(e => console.log(e));
                document.getElementById('loginError').style.display = 'block'; 
            }
        }

        // 🟢 دوال الهوية الـ 3D (تظهر فوق الموقع كله) 🟢
        function openIdCard() {
            const myName = document.getElementById('rankNameDisp').innerText;
            let allUsers = [...((typeof ConfigUsers !== 'undefined') ? ConfigUsers : []), ...(JSON.parse(localStorage.getItem('lspd_sys_users')) || [])];
            let me = allUsers.find(x => x.name === myName);
            
            document.getElementById('cardNameDisp').innerText = myName;
            document.getElementById('cardRankDisp').innerText = me ? me.rank : 'Officer';
            
            // تحميل الصورة لو محفوظة
            const savedImg = localStorage.getItem('user_id_img_' + myName);
            if(savedImg) document.getElementById('cardImage').src = savedImg;

            document.getElementById('idCardOverlay').style.display = 'flex';
            VanillaTilt.init(document.querySelectorAll(".executive-card"));
        }
        
        function closeIdCard() { 
            document.getElementById('idCardOverlay').style.display = 'none'; 
        }

        function updateCardImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    const myName = document.getElementById('rankNameDisp').innerText;
                    
                    // تحديث الصورة في الهوية
                    document.getElementById('cardImage').src = e.target.result;
                    localStorage.setItem('user_id_img_' + myName, e.target.result);
                    
                    // تحديث الصورة في الملف الشخصي في نفس الوقت
                    document.getElementById('profAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profAvatarIcon').style.display = 'none';
                    localStorage.setItem('profilePic_' + myName, e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function logout() { location.reload(); }

        function goHome() {
            document.getElementById('moduleView').style.display = 'none';
            document.getElementById('profileView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'flex';
        }

        function openProfile() {
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('moduleView').style.display = 'none';
            document.getElementById('profileView').style.display = 'flex';
            
            const myName = document.getElementById('rankNameDisp').innerText;
            document.getElementById('pName').innerText = myName;
            
            let allUsers = [...((typeof ConfigUsers !== 'undefined') ? ConfigUsers : []), ...(JSON.parse(localStorage.getItem('lspd_sys_users')) || [])];
            let me = allUsers.find(x => x.name === myName);
            document.getElementById('pRank').innerText = me ? me.rank : 'Officer';
            document.getElementById('pSec').innerText = isHighCommand ? 'Top Secret' : 'Standard';

            let savedPic = localStorage.getItem('profilePic_' + myName);
            if(!savedPic) savedPic = localStorage.getItem('user_id_img_' + myName); // سحب صورة الهوية إن وجدت

            if(savedPic) { document.getElementById('profAvatar').style.backgroundImage = `url(${savedPic})`; document.getElementById('profAvatarIcon').style.display = 'none'; } 
            else { document.getElementById('profAvatar').style.backgroundImage = ''; document.getElementById('profAvatarIcon').style.display = 'block'; }

            const myReps = db.reports.filter(r => r.includes(myName));
            document.getElementById('profReportsList').innerHTML = myReps.length > 0 ? myReps.map(r => `<div class="rec-item">${r}</div>`).join('') : `<div style="padding:15px; color:#666; text-align:center;">لا توجد تقارير.</div>`;

            const myTasks = db.tasks.filter(t => t.officer.includes(myName) || t.assignee.includes(myName));
            document.getElementById('profTasksList').innerHTML = myTasks.length > 0 ? myTasks.map(t => `<div class="rec-item" style="display:block;"><div style="color:var(--cyan);font-weight:bold;margin-bottom:5px;">${t.reason}</div><div style="font-size:0.8rem;color:#888;">النقاط: ${t.points} | ${t.approved?'معتمدة':'انتظار'}</div></div>`).join('') : `<div style="padding:15px; color:#666; text-align:center;">لا توجد مهام.</div>`;
        }

        function updateProfilePic(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let myName = document.getElementById('rankNameDisp').innerText;
                    let imgSrc = e.target.result;
                    
                    // تحديث الملف الشخصي
                    document.getElementById('profAvatar').style.backgroundImage = `url(${imgSrc})`;
                    document.getElementById('profAvatarIcon').style.display = 'none';
                    localStorage.setItem('profilePic_' + myName, imgSrc);

                    // تحديث بطاقة الهوية أيضاً
                    document.getElementById('cardImage').src = imgSrc;
                    localStorage.setItem('user_id_img_' + myName, imgSrc);
                }; reader.readAsDataURL(input.files[0]);
            }
        }

        function renderModules() {
            const c = document.getElementById('modulesContainer'); c.innerHTML = ''; 
            modules.forEach((m, idx) => {
                c.innerHTML += `<div class="menu-btn" onclick="openMod('${m.id}')" style="animation-delay:${idx*0.05}s">${i18n[currentLang][m.i18n_t]}</div>`;
            });
        }

        function openMod(id) {
            currentModule = modules.find(m => m.id === id);
            
            if(currentModule.isCrypto) { document.getElementById('cryptoModal').style.display = 'flex'; return; }
            
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('profileView').style.display = 'none';
            document.getElementById('moduleView').style.display = 'flex';
            document.getElementById('mTitle').innerText = i18n[currentLang][currentModule.i18n_t];
            
            const dynamicArea = document.getElementById('dynamicContentArea'), inpArea = document.getElementById('mInputs'), submitBtn = document.getElementById('submitBtn');
            
            // --- تم إصلاح مدخلات الأقسام لتكون منظمة ومطابقة للصور ---
            if(currentModule.isAccountsForm) {
                dynamicArea.innerHTML = `<div id="mList"></div>`;
                if(canManageAccounts) { 
                    const t = i18n[currentLang]; let rankOptions = '';
                    SystemRanks.forEach((r, idx) => { if(idx > myRankIdx) rankOptions += `<option value="${r}">${r}</option>`; });
                    submitBtn.style.display = 'block';
                    
                    // إصلاح ترتيب المدخلات لقسم المسؤولين
                    inpArea.innerHTML = `
                        <div class="grid-inputs">
                            <input type="text" id="o-user" class="gen-input" placeholder="${t.o_user}" autocomplete="off">
                            <input type="password" id="o-pass" class="gen-input" placeholder="${t.o_pass}" autocomplete="off">
                            <input type="text" id="o-name" class="gen-input" placeholder="${t.o_name}" autocomplete="off">
                            <select id="o-rank" class="gen-input"><option value="" disabled selected>${t.o_rank}</option>${rankOptions}</select>
                        </div>`;
                } else { submitBtn.style.display = 'none'; inpArea.innerHTML = `<div style="color:var(--yellow); text-align:center; padding:15px; border:1px solid rgba(255,193,7,0.3); border-radius:4px; margin-bottom:10px; background:rgba(255,193,7,0.1);">${i18n[currentLang].o_no_perm}</div>`; }
                renderAccounts();
                
            } else if(currentModule.isReportForm) {
                dynamicArea.innerHTML = `<div id="mList"></div>`;
                if(isOfficer) {
                    submitBtn.style.display = 'block'; const t = i18n[currentLang];
                    inpArea.innerHTML = `
                        <div class="grid-inputs">
                            <input type="text" id="r-name" class="gen-input" placeholder="${t.r_name}">
                            <input type="text" id="r-badge" class="gen-input" placeholder="${t.r_badge}">
                        </div>
                        <input type="text" id="r-crim" class="gen-input" placeholder="${t.r_crim}">
                        <textarea id="r-details" class="gen-input" placeholder="${t.r_det}" style="height:100px; resize:vertical;"></textarea>
                        
                        <div class="file-input-wrapper">
                            <span id="file-count" class="file-label-text">اضغط هنا لتحديد المرفقات (أو استخدم Ctrl لاختيار أكثر من صورة)</span>
                            <input type="file" id="r-image" multiple onchange="document.getElementById('file-count').innerText = this.files.length > 0 ? '✔️ تم تحديد (' + this.files.length + ') ملفات' : 'اضغط هنا لتحديد المرفقات'">
                        </div>`;
                } else { submitBtn.style.display = 'none'; inpArea.innerHTML = ''; }
                renderRecords();
                
            } else if(currentModule.isVideo) {
                dynamicArea.innerHTML = `<div class="video-grid" id="videoGridContainer"></div>`;
                if(isOfficer) {
                    submitBtn.style.display = 'block'; const t = i18n[currentLang];
                    
                    // إصلاح قسم الفيديو ليطابق الصورة بالضبط
                    inpArea.innerHTML = `
                        <input type="text" id="v-title" class="gen-input" placeholder="${t.v_title}">
                        <input type="text" id="v-yt" class="gen-input" placeholder="${t.v_yt}">
                        
                        <div class="file-input-wrapper">
                            <span id="v-file-name" class="file-label-text">${t.v_or}</span>
                            <input type="file" id="v-file" accept="video/mp4,video/webm,video/*" onchange="document.getElementById('v-file-name').innerText = this.files[0].name; document.getElementById('v-file-name').style.color = '#00eaff';">
                        </div>`;
                } else { submitBtn.style.display = 'none'; inpArea.innerHTML = ''; }
                renderVideoGrid();
                
            } else if(currentModule.isTable) {
                dynamicArea.innerHTML = `<div id="tasksTableContainer"></div>`;
                if(isOfficer) {
                    submitBtn.style.display = 'block'; const t = i18n[currentLang];
                    
                    // إصلاح المهام وإزالة undefined
                    inpArea.innerHTML = `
                        <div class="grid-inputs">
                            <input type="text" id="t-officer" class="gen-input" placeholder="${t.th_officer}">
                            <input type="text" id="t-assignee" class="gen-input" placeholder="${t.th_assignee}">
                            <input type="text" id="t-reason" class="gen-input" placeholder="${t.th_reason}">
                            <input type="number" id="t-pts" class="gen-input" placeholder="${t.th_pts}">
                        </div>`;
                } else { submitBtn.style.display = 'none'; inpArea.innerHTML = ''; }
                renderTasksTable();
                
            } else {
                submitBtn.style.display = 'block'; dynamicArea.innerHTML = `<div id="mList"></div>`; inpArea.innerHTML = '';
                const arr = currentLang === 'ar' ? currentModule.inputsAr : currentModule.inputsEn;
                if(arr) {
                    arr.forEach((ph, i) => { inpArea.innerHTML += `<input type="text" id="inp-${i}" class="gen-input" placeholder="${ph}" autocomplete="off">`; });
                    if(currentModule.hasImage) inpArea.innerHTML += `
                        <div class="file-input-wrapper">
                            <span id="img-file-name" class="file-label-text">إرفاق صورة</span>
                            <input type="file" id="inp-image" accept="image/*" onchange="document.getElementById('img-file-name').innerText = this.files[0].name; document.getElementById('img-file-name').style.color = '#00eaff';">
                        </div>`;
                }
                renderRecords();
            }
        }

        function renderAccounts() {
            const list = document.getElementById('mList'); if(!list) return; list.innerHTML = '';
            
            let configU = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            configU.forEach((u) => {
                let rankColor = configOfficers.includes(u.rank) ? 'var(--cyan)' : 'var(--text-muted)'; 
                // إصلاح تنسيق الحسابات مع أيقونة الحذف
                list.innerHTML += `
                    <div class="rec-item" style="align-items: center;">
                        <div style="flex:1; text-align:right;">
                            <div style="font-size:1.05rem; font-weight:bold; margin-bottom:4px;"><span style="color:${rankColor}">[${u.rank}]</span> ${u.name} <span style="font-size:0.65rem; background:#111; padding:2px 6px; border-radius:4px; color:#888; border:1px solid #333;">أساسي</span></div>
                            <div style="font-size:0.8rem; color:#888;">${u.user} | ${u.pass}</div>
                        </div>
                    </div>`;
            });

            let users = JSON.parse(localStorage.getItem('lspd_sys_users')) || [];
            users.forEach((u, idx) => {
                let uRankIdx = SystemRanks.indexOf(u.rank); let rankColor = configOfficers.includes(u.rank) ? 'var(--cyan)' : 'var(--text-muted)'; 
                const del = (canManageAccounts && myRankIdx < uRankIdx) ? `<i class="fa-solid fa-trash action-icon icon-del" onclick="delAccount(${idx})" title="حذف الحساب"></i>` : '';
                list.innerHTML += `
                    <div class="rec-item" style="align-items: center;">
                        ${del}
                        <div style="flex:1; text-align:right;">
                            <div style="font-size:1.05rem; font-weight:bold; margin-bottom:4px;"><span style="color:${rankColor}">[${u.rank}]</span> ${u.name}</div>
                            <div style="font-size:0.8rem; color:#888;">${u.user} | ${u.pass}</div>
                        </div>
                    </div>`;
            });
        }

        function renderVideoGrid() {
            const container = document.getElementById('videoGridContainer'); if(!container) return; container.innerHTML = '';
            db['video'].forEach((vid, idx) => {
                const media = vid.type === 'yt' ? `<iframe class="video-player" src="${vid.url}" frameborder="0" allowfullscreen></iframe>` : `<video class="video-player" src="${vid.url}" controls></video>`;
                const delBtn = canManageAccounts ? `<button class="del-video-btn" onclick="delRec(${idx})"><i class="fa-solid fa-trash"></i></button>` : '';
                container.innerHTML += `<div class="video-card">${delBtn}<div class="video-card-title" title="${vid.title}">${vid.title}</div>${media}</div>`;
            });
        }

        function renderTasksTable() {
            const container = document.getElementById('tasksTableContainer'); if(!container) return; const t = i18n[currentLang];
            let html = `<table class="task-table"><thead><tr><th>${t.th_officer}</th><th>${t.th_assignee}</th><th>${t.th_pts}</th><th>${t.th_reason}</th><th>${t.th_status}</th>${isOfficer ? `<th>${t.th_act}</th>` : ''}</tr></thead><tbody>`;
            db['tasks'].forEach((task, idx) => {
                const badge = task.approved ? `<span class="badge-approved">${t.st_appr}</span>` : `<span class="badge-pending">${t.st_pend}</span>`;
                let acts = '';
                if(isOfficer) { acts += `<i class="fa-solid fa-trash action-icon icon-del" onclick="delRec(${idx})"></i>`; if(isHighCommand && !task.approved) acts += ` <i class="fa-solid fa-check-circle action-icon icon-check" style="color:var(--green);" onclick="approveTask(${idx})"></i>`; }
                html += `<tr><td>${task.officer}</td><td>${task.assignee}</td><td style="color:var(--cyan);font-weight:bold;">${task.points}</td><td>${task.reason}</td><td>${badge}</td>${isOfficer ? `<td>${acts}</td>` : ''}</tr>`;
            });
            container.innerHTML = html + `</tbody></table>`;
        }

        function renderRecords() {
            const list = document.getElementById('mList'); if(!list) return; list.innerHTML = '';
            db[currentModule.id].forEach((rec, idx) => {
                const del = canManageAccounts ? `<i class="fa-solid fa-trash action-icon icon-del" onclick="delRec(${idx})"></i>` : '';
                list.innerHTML += `<div class="rec-item" style="align-items: center;">${del}<div style="flex:1; text-align:right;">${rec}</div></div>`;
            });
        }

        function addRecord() {
            if(currentModule.isAccountsForm) {
                if(!canManageAccounts) return; 
                const u = document.getElementById('o-user').value.trim(), p = document.getElementById('o-pass').value.trim(), n = document.getElementById('o-name').value.trim(), r = document.getElementById('o-rank').value;
                if(!u || !p || !n || !r) { alert(i18n[currentLang]['o_err']); return; }
                
                let configU = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
                let localUsers = JSON.parse(localStorage.getItem('lspd_sys_users')) || [];
                if(configU.some(x => x.user === u) || localUsers.some(x => x.user === u)) { alert(i18n[currentLang]['o_exists']); return; }
                
                if (typeof GetParentResourceName !== "undefined") {
                    fetch(`https://${GetParentResourceName()}/CreateNewAccount`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                        body: JSON.stringify({ user: u, pass: p, name: n, rank: r })
                    }).catch(e => console.log(e));
                }

                localUsers.push({ user: u, pass: p, name: n, rank: r }); localStorage.setItem('lspd_sys_users', JSON.stringify(localUsers));
                ['o-user','o-pass','o-name','o-rank'].forEach(id => document.getElementById(id).value = ''); renderAccounts();
            } else if(currentModule.isReportForm) {
                const n = document.getElementById('r-name').value, b = document.getElementById('r-badge').value, c = document.getElementById('r-crim').value, d = document.getElementById('r-details').value;
                const fileInput = document.getElementById('r-image');
                if(!n || !d) return;
                let promises = Array.from(fileInput.files).map(file => {
                    return new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve({ src: e.target.result, isImg: file.type.startsWith('image/'), name: file.name }); r.readAsDataURL(file); });
                });
                Promise.all(promises).then(fileDatas => {
                    let filesHtml = '';
                    if(fileDatas.length > 0) {
                        filesHtml += '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">';
                        fileDatas.forEach(fd => {
                            if(fd.isImg) filesHtml += `<img src="${fd.src}" class="clickable-img" style="width:80px; height:80px; object-fit:cover; border-radius:4px; border: 1px solid rgba(255,255,255,0.1);" onclick="openImgZoom('${fd.src}')">`;
                            else filesHtml += `<a href="${fd.src}" download="${fd.name}" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:80px; height:80px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); color:var(--cyan); border-radius:4px; text-decoration:none; font-size:0.7rem; text-align:center; padding:5px;"><i class="fa-solid fa-file-lines" style="font-size:1.5rem; margin-bottom:5px;"></i></a>`;
                        });
                        filesHtml += '</div>';
                    }
                    const reportLabel = currentLang === 'ar' ? 'نوع التقرير' : 'Report Type';
                    db['reports'].push(`<div style="width:100%;"><div style="font-size:1.1rem; font-weight:bold; color:var(--cyan); margin-bottom:5px;">[${b}] ${n} | <span style="color:#888; font-size:0.95rem;">${reportLabel}: ${c}</span></div><div style="font-size:0.85rem; color:#ccc; white-space:pre-wrap; background:rgba(0,0,0,0.5); padding:10px; border-radius:4px; line-height:1.6;">${d}</div>${filesHtml}</div>`);
                    ['r-name','r-badge','r-crim','r-details'].forEach(id => document.getElementById(id).value = ''); fileInput.value = ''; document.getElementById('file-count').innerText = 'اضغط هنا لتحديد المرفقات'; renderRecords();
                });
            } else if(currentModule.isVideo) {
                const t = document.getElementById('v-title').value, yt = document.getElementById('v-yt').value, fileIn = document.getElementById('v-file');
                if(!t) return;
                if(yt) {
                    let ytid = false; const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\/shorts\/)([^#\&\?]*).*/; const match = yt.match(regExp);
                    if (match && match[2].length === 11) { ytid = match[2]; }
                    if(ytid) db['video'].push({ type: 'yt', url: `https://www.youtube-nocookie.com/embed/${ytid}?rel=0`, title: t }); else return alert(currentLang==='ar'?'رابط يوتيوب غير صالح':'Invalid YT link');
                } else if(fileIn.files && fileIn.files[0]) db['video'].push({ type: 'local', url: URL.createObjectURL(fileIn.files[0]), title: t }); else return;
                ['v-title', 'v-yt'].forEach(id => document.getElementById(id).value = ''); fileIn.value = ''; document.getElementById('v-file-name').innerText = i18n[currentLang].v_or; document.getElementById('v-file-name').style.color = '#666'; renderVideoGrid();
            } else if(currentModule.isTable) {
                const o = document.getElementById('t-officer').value, a = document.getElementById('t-assignee').value, p = document.getElementById('t-pts').value, r = document.getElementById('t-reason').value;
                if(!o || !a || !p || !r) return;
                db['tasks'].push({ officer: o, assignee: a, points: p, reason: r, approved: false });
                ['t-officer','t-assignee','t-pts','t-reason'].forEach(id => document.getElementById(id).value = ''); renderTasksTable();
            } else {
                let vals = [], empty = false;
                const arr = currentLang === 'ar' ? currentModule.inputsAr : currentModule.inputsEn;
                arr.forEach((_, i) => { const v = document.getElementById(`inp-${i}`).value; if(!v) empty = true; vals.push(v); });
                if(empty) return;
                if(currentModule.hasImage) {
                    const fileInput = document.getElementById('inp-image');
                    if(!fileInput.files || !fileInput.files[0]) return;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        let textHtml = ''; vals.forEach((v, i) => {
                            if(i === 0) textHtml += `<div style="font-weight:800; font-size:1.1rem; color:var(--cyan); margin-bottom:5px;">${v}</div>`;
                            else textHtml += `<div style="font-size:0.85rem; color:#bbb; margin-bottom:2px;">• ${v}</div>`;
                        });
                        const imgHtml = `<img src="${e.target.result}" class="clickable-img" style="width:70px; height:70px; object-fit:cover; border-radius:4px; border: 1px solid rgba(255,255,255,0.1);" onclick="openImgZoom('${e.target.result}')">`;
                        db[currentModule.id].push(`<div style="display:flex; align-items:flex-start; padding:5px;">${imgHtml} <div style="margin-inline-start:15px; flex:1; display:flex; flex-direction:column; justify-content:center;">${textHtml}</div></div>`);
                        arr.forEach((_, i) => document.getElementById(`inp-${i}`).value = ''); fileInput.value = ''; document.getElementById('img-file-name').innerText = 'إرفاق صورة'; document.getElementById('img-file-name').style.color = '#666'; renderRecords();
                    }; reader.readAsDataURL(fileInput.files[0]);
                } else {
                    db[currentModule.id].push(vals.join(' | '));
                    arr.forEach((_, i) => document.getElementById(`inp-${i}`).value = ''); renderRecords();
                }
            }
        }

        function delAccount(idx) { 
            let users = JSON.parse(localStorage.getItem('lspd_sys_users')) || []; 
            if (typeof GetParentResourceName !== "undefined") {
                fetch(`https://${GetParentResourceName()}/DeleteAccount`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                    body: JSON.stringify({ user: users[idx].user })
                }).catch(e => console.log(e));
            }
            users.splice(idx, 1); localStorage.setItem('lspd_sys_users', JSON.stringify(users)); renderAccounts(); 
        }

        function delRec(idx) { db[currentModule.id].splice(idx, 1); if(currentModule.isVideo) renderVideoGrid(); else if(currentModule.isTable) renderTasksTable(); else renderRecords(); }
        function approveTask(idx) { if(!isHighCommand) return; db['tasks'][idx].approved = true; renderTasksTable(); }
        function doCrypto(type) { const v = document.getElementById('cryIn').value, out = document.getElementById('cryOut'); if(!v) return; try { out.innerText = (type === 'enc') ? btoa(unescape(encodeURIComponent(v))) : decodeURIComponent(escape(atob(v))); } catch(e) { out.innerText = "Error"; } }
        function copyCrypto() { navigator.clipboard.writeText(document.getElementById('cryOut').innerText); }
    </script>
</body>
</html>
